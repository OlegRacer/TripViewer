<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aRacer Trip Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<style>
  :root{
    --bg:#000000;--panel:#0d0d0f;--line:rgba(255,255,255,0.07);
    --text:#f2f2f0;--muted:#666;
    --cyan:#37e0e6;--amber:#ffb74d;--red:#ff4d4d;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:'Rajdhani','Segoe UI',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .num{font-family:'JetBrains Mono','Courier New',monospace;font-weight:700;}

  /* ── Верхня панель ── */
  header{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:10px 14px;border-bottom:1px solid var(--line);background:#000;
    position:sticky;top:0;z-index:20;
  }
  header h1{
    font-size:17px;margin:0;font-weight:700;letter-spacing:0.5px;
    color:var(--cyan);white-space:nowrap;
  }
  header h1 span{color:var(--muted);font-weight:500;}
  #fileBtn{
    border:1px solid var(--line);border-radius:6px;padding:7px 13px;
    font-size:12px;color:var(--text);background:var(--panel);cursor:pointer;
    white-space:nowrap;
  }
  #fileBtn:hover{border-color:var(--cyan);}
  #fileName{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
  #fileInput{display:none;}

  /* ── Порожній стан ── */
  #empty{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;padding:60px 20px;text-align:center;color:var(--muted);
    min-height:60vh;
  }
  #empty .ic{font-size:52px;opacity:0.5;}
  #dropzone{
    border:2px dashed var(--line);border-radius:12px;padding:34px 40px;
    transition:border-color 0.15s,background 0.15s;cursor:pointer;
  }
  #dropzone.drag{border-color:var(--cyan);background:rgba(55,224,230,0.05);}
  #dropzone b{color:var(--text);}
  #errBox{
    display:none;margin:10px 14px 0;padding:10px 14px;border-radius:8px;
    background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.3);
    color:#ff9f9f;font-size:13px;
  }

  /* ── Сумарна статистика поїздки ── */
  #summary{
    display:none;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
    gap:1px;background:var(--line);border-bottom:1px solid var(--line);
  }
  .stat{background:var(--bg);padding:8px 10px;text-align:center;}
  .stat .sl{font-size:10px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;}
  .stat .sv{font-size:18px;margin-top:2px;}
  .stat .su{font-size:10px;color:var(--muted);margin-left:2px;}

  /* ── Основний контент ── */
  #main{display:none;}
  #mapWrap{position:relative;height:min(42vh,380px);border-bottom:1px solid var(--line);}
  #map{width:100%;height:100%;background:#0a0a0a;}
  .leaflet-control-attribution{background:rgba(0,0,0,0.6) !important;color:#888 !important;font-size:9px !important;}
  .leaflet-control-attribution a{color:#aaa !important;}

  /* ── Плитки телеметрії (та сама мова, що й живий дашборд) ── */
  #tiles{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:1px;background:var(--line);
  }
  .ptile{
    background:var(--panel);padding:10px 12px 8px;position:relative;
    cursor:pointer;overflow:hidden;
  }
  .ptile .ph{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;}
  .ptile .pn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
  .ptile .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .ptile .pv{font-size:20px;}
  .ptile .pu{font-size:10px;color:var(--muted);}
  .chartWrap{position:relative;height:46px;margin-top:2px;}
  .chartWrap canvas{width:100%;height:100%;display:block;}
  .scrubLine{
    position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.55);
    left:0;pointer-events:none;
  }
  .scrubLine::after{
    content:'';position:absolute;top:-2px;left:-2px;width:5px;height:5px;
    border-radius:50%;background:inherit;
  }

  /* ── Скраббер знизу ── */
  #scrubBar{
    position:sticky;bottom:0;display:flex;align-items:center;gap:10px;
    padding:10px 14px;background:#000;border-top:1px solid var(--line);
    z-index:20;
  }
  #playBtn{
    width:34px;height:34px;border-radius:50%;border:1px solid var(--line);
    background:var(--panel);color:var(--text);font-size:14px;cursor:pointer;
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
  }
  #playBtn:active{background:#1a1a1a;}
  #scrubSlider{flex:1;accent-color:var(--cyan);}
  #scrubTime{font-size:12px;color:var(--muted);white-space:nowrap;min-width:96px;text-align:right;}
  #speedSel{
    border:1px solid var(--line);border-radius:6px;background:var(--panel);
    color:var(--text);font-size:12px;padding:5px 6px;
  }
</style>
</head>
<body>

<header>
  <h1>aRacer <span>Trip Viewer</span></h1>
  <button id="fileBtn">📂 Відкрити GPX</button>
  <input type="file" id="fileInput" accept=".gpx">
  <span id="fileName"></span>
</header>

<div id="errBox"></div>

<div id="empty">
  <div id="dropzone">
    <div class="ic">🏍️</div>
    <div><b>Відкрий GPX-файл поїздки</b><br>або перетягни його сюди</div>
    <div style="font-size:11px;margin-top:6px;">Файл, який дашборд зберігає через кнопку "⏺ Trip"</div>
  </div>
</div>

<div id="summary"></div>

<div id="main">
  <div id="mapWrap"><div id="map"></div></div>
  <div id="tiles"></div>
</div>

<div id="scrubBar" style="display:none;">
  <button id="playBtn">▶</button>
  <input type="range" id="scrubSlider" min="0" max="0" value="0" step="1">
  <select id="speedSel">
    <option value="1">1×</option>
    <option value="5">5×</option>
    <option value="10" selected>10×</option>
    <option value="25">25×</option>
    <option value="50">50×</option>
  </select>
  <span id="scrubTime">00:00 / 00:00</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script>
// ── Ті самі кольори параметрів, що й у живому дашборді (index.html) — щоб
// переглядач поїздки читався як продовження того самого продукту, а не
// окремий інструмент.
const PARAMS = [
  {key:'spd',  label:'Швидкість',    unit:'км/год', color:'#37e0e6', dec:0, get:p=>p.spd!=null?p.spd*3.6:null},
  {key:'rpm',  label:'RPM',          unit:'об/хв',  color:'#ffd23f', dec:0, get:p=>p.rpm},
  {key:'tps',  label:'TPS',         unit:'%',      color:'#22c1c9', dec:0, get:p=>p.tps},
  {key:'lean', label:'Кут нахилу',   unit:'°',      color:'#f472b6', dec:0, get:p=>p.lean!=null?Math.abs(p.lean):null},
  {key:'g',    label:'G-сила',       unit:'G',      color:'#ff6b6b', dec:2, get:p=>p.g},
  {key:'tEng', label:'T Двигуна',    unit:'°C',     color:'#3b82f6', dec:0, get:p=>p.tEng},
  {key:'tAir', label:'T Повітря',    unit:'°C',     color:'#06b6d4', dec:0, get:p=>p.tAir},
  {key:'volt', label:'Напруга',      unit:'V',      color:'#4ade80', dec:1, get:p=>p.volt},
  {key:'map',  label:'MAP',          unit:'psi',    color:'#a29bfe', dec:0, get:p=>p.map},
  {key:'inj',  label:'Inj Rate',     unit:'мс',     color:'#ff9f43', dec:1, get:p=>p.inj},
  {key:'alt',  label:'Висота',       unit:'м',      color:'#82e6c2', dec:0, get:p=>p.alt},
];

let tripPoints = [];
let scrubIndex = 0;
let playing = false, playTimer = null;
let map = null, routeLine = null, marker = null;
const charts = {};

/* ── GPX-парсинг ──
   Стандартні lat/lon/ele/time читаємо як звичайний GPX. Кастомна
   телеметрія (rpm/tps/volt/тощо) лежить у <extensions>, у ЄДИНОМУ дочірньому
   елементі — беремо firstElementChild і читаємо його атрибути напряму, без
   прив'язки до конкретного тег-неймспейсу (менш ламке, ніж шукати за
   точною qualified-назвою тегу в різних браузерах). */
function parseGPX(xmlText){
  const xml = new DOMParser().parseFromString(xmlText, 'application/xml');
  if(xml.querySelector('parsererror')) throw new Error('файл не є коректним XML/GPX');
  const trkpts = [...xml.getElementsByTagName('trkpt')];
  if(!trkpts.length) throw new Error('у файлі не знайдено жодної точки маршруту (trkpt)');

  const attrNum = (el, name)=>{
    if(!el) return null;
    const v = el.getAttribute(name);
    if(v===null || v==='') return null;
    const n = parseFloat(v);
    return isNaN(n) ? null : n;
  };

  const points = trkpts.map(pt=>{
    const lat = parseFloat(pt.getAttribute('lat'));
    const lon = parseFloat(pt.getAttribute('lon'));
    const eleEl = pt.querySelector('ele');
    const timeEl = pt.querySelector('time');
    const extEl = pt.querySelector('extensions');
    const teleEl = extEl ? extEl.firstElementChild : null;
    return {
      lat, lon,
      alt: eleEl ? parseFloat(eleEl.textContent) : null,
      t: timeEl ? new Date(timeEl.textContent).getTime() : null,
      spd:  attrNum(teleEl,'spdMps'),
      rpm:  attrNum(teleEl,'rpm'),
      tps:  attrNum(teleEl,'tps'),
      volt: attrNum(teleEl,'volt'),
      tEng: attrNum(teleEl,'tEng'),
      tAir: attrNum(teleEl,'tAir'),
      map:  attrNum(teleEl,'map'),
      inj:  attrNum(teleEl,'inj'),
      lean: attrNum(teleEl,'lean'),
      g:    attrNum(teleEl,'g'),
    };
  }).filter(p=>!isNaN(p.lat) && !isNaN(p.lon));

  if(points.length < 2) throw new Error('замало точок із координатами для маршруту');
  return points;
}

function haversineM(lat1,lon1,lat2,lon2){
  const R=6371000, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDuration(sec){
  sec = Math.max(0, Math.round(sec));
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  const pad=n=>String(n).padStart(2,'0');
  return h>0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

function computeSummary(points){
  let distM=0;
  for(let i=1;i<points.length;i++){
    distM += haversineM(points[i-1].lat, points[i-1].lon, points[i].lat, points[i].lon);
  }
  const t0=points.find(p=>p.t!=null)?.t, t1=[...points].reverse().find(p=>p.t!=null)?.t;
  const durationSec = (t0!=null && t1!=null) ? (t1-t0)/1000 : null;
  const maxOf = getter => points.reduce((m,p)=>{ const v=getter(p); return (v!=null && v>m) ? v : m; }, -Infinity);
  return {
    distanceKm: distM/1000,
    durationSec,
    maxSpeedKmh: maxOf(p=>p.spd!=null?p.spd*3.6:null),
    maxRpm: maxOf(p=>p.rpm),
    maxLean: maxOf(p=>p.lean!=null?Math.abs(p.lean):null),
    maxG: maxOf(p=>p.g),
  };
}

function renderSummary(s){
  const box = document.getElementById('summary');
  const stat = (label, val, unit) => `<div class="stat"><div class="sl">${label}</div><div class="sv num">${val}<span class="su">${unit}</span></div></div>`;
  box.innerHTML =
    stat('Дистанція', s.distanceKm.toFixed(1), 'км') +
    stat('Тривалість', fmtDuration(s.durationSec||0), '') +
    stat('Макс. швидкість', isFinite(s.maxSpeedKmh)?Math.round(s.maxSpeedKmh):'—', 'км/год') +
    stat('Макс. RPM', isFinite(s.maxRpm)?Math.round(s.maxRpm):'—', '') +
    stat('Макс. нахил', isFinite(s.maxLean)?Math.round(s.maxLean):'—', '°') +
    stat('Макс. G', isFinite(s.maxG)?s.maxG.toFixed(2):'—', 'G');
  box.style.display = 'grid';
}

/* ── Карта ── */
function initMap(points){
  const latlngs = points.map(p=>[p.lat,p.lon]);
  if(map){ map.remove(); map=null; }
  map = L.map('map', {zoomControl:true, attributionControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap', maxZoom:19
  }).addTo(map);
  routeLine = L.polyline(latlngs, {color:'#37e0e6', weight:3, opacity:0.85}).addTo(map);
  map.fitBounds(routeLine.getBounds(), {padding:[20,20]});
  marker = L.circleMarker(latlngs[0], {radius:7, color:'#000', weight:2, fillColor:'#ffd23f', fillOpacity:1}).addTo(map);
}

/* ── Плитки телеметрії + графіки-спарклайни ── */
function buildTiles(points){
  const wrap = document.getElementById('tiles');
  wrap.innerHTML = '';
  const labels = points.map((_,i)=>i);

  PARAMS.forEach(param=>{
    const data = points.map(param.get);
    const hasData = data.some(v=>v!=null);

    const tile = document.createElement('div');
    tile.className = 'ptile';
    tile.innerHTML = `
      <div class="ph">
        <div class="pn"><span class="dot" style="background:${param.color}"></span>${param.label}</div>
        <div><span class="pv num" id="val-${param.key}" style="color:${param.color}">—</span><span class="pu">${param.unit}</span></div>
      </div>
      <div class="chartWrap" id="wrap-${param.key}">
        <canvas id="chart-${param.key}"></canvas>
        <div class="scrubLine" id="line-${param.key}" style="background:${param.color}"></div>
      </div>`;
    wrap.appendChild(tile);

    if(!hasData){
      tile.querySelector('.chartWrap').innerHTML = '<div style="color:var(--muted);font-size:11px;padding-top:14px;text-align:center;">немає даних у файлі</div>';
      return;
    }

    const ctx = document.getElementById('chart-'+param.key).getContext('2d');
    charts[param.key] = new Chart(ctx, {
      type:'line',
      data:{ labels, datasets:[{ data, borderColor:param.color, borderWidth:1.4, pointRadius:0, tension:0.15, spanGaps:true }]},
      options:{
        responsive:true, maintainAspectRatio:false, animation:false,
        interaction:{intersect:false},
        scales:{ x:{display:false}, y:{display:false} },
        plugins:{ legend:{display:false}, tooltip:{enabled:false} },
      }
    });

    // Клік/тап по графіку — перейти на цю точку часу.
    const wrapEl = document.getElementById('wrap-'+param.key);
    const seekFromEvent = (clientX)=>{
      const rect = wrapEl.getBoundingClientRect();
      const frac = Math.max(0, Math.min(1, (clientX-rect.left)/rect.width));
      seekTo(Math.round(frac*(tripPoints.length-1)));
    };
    wrapEl.addEventListener('click', e=>seekFromEvent(e.clientX));
  });
}

/* ── Скраб/відтворення ── */
function seekTo(index){
  if(!tripPoints.length) return;
  scrubIndex = Math.max(0, Math.min(tripPoints.length-1, index));
  const p = tripPoints[scrubIndex];

  if(marker && p.lat!=null) marker.setLatLng([p.lat, p.lon]);

  const frac = tripPoints.length>1 ? scrubIndex/(tripPoints.length-1) : 0;
  PARAMS.forEach(param=>{
    const val = param.get(p);
    const valEl = document.getElementById('val-'+param.key);
    if(valEl) valEl.textContent = (val==null) ? '—' : val.toFixed(param.dec);
    const lineEl = document.getElementById('line-'+param.key);
    if(lineEl) lineEl.style.left = (frac*100)+'%';
  });

  const slider = document.getElementById('scrubSlider');
  if(parseInt(slider.value) !== scrubIndex) slider.value = scrubIndex;

  const t0 = tripPoints[0].t, t1 = tripPoints[tripPoints.length-1].t;
  const elapsed = (p.t!=null && t0!=null) ? (p.t-t0)/1000 : scrubIndex;
  const total = (t1!=null && t0!=null) ? (t1-t0)/1000 : tripPoints.length-1;
  document.getElementById('scrubTime').textContent = fmtDuration(elapsed)+' / '+fmtDuration(total);
}

function togglePlay(){
  const btn = document.getElementById('playBtn');
  if(playing){
    playing=false; clearInterval(playTimer); playTimer=null;
    btn.textContent='▶';
    return;
  }
  if(scrubIndex >= tripPoints.length-1) scrubIndex = 0; // з початку, якщо доїхали до кінця
  playing=true; btn.textContent='⏸';
  const speed = parseInt(document.getElementById('speedSel').value)||10;
  playTimer = setInterval(()=>{
    if(scrubIndex >= tripPoints.length-1){ togglePlay(); return; }
    seekTo(scrubIndex+1);
  }, 1000/speed); // 1 точка лога = 1 реальна секунда поїздки, тож speed — це і є множник швидкості відтворення
}

/* ── Завантаження файлу ── */
function loadTrip(points){
  if(playing) togglePlay();
  tripPoints = points;
  scrubIndex = 0;

  document.getElementById('empty').style.display='none';
  document.getElementById('errBox').style.display='none';
  document.getElementById('main').style.display='block';
  document.getElementById('scrubBar').style.display='flex';

  renderSummary(computeSummary(points));
  initMap(points);
  buildTiles(points);

  const slider = document.getElementById('scrubSlider');
  slider.max = points.length-1;
  slider.value = 0;

  seekTo(0);
}

function showError(msg){
  const box = document.getElementById('errBox');
  box.textContent = '⚠ '+msg;
  box.style.display='block';
}

function handleFile(file){
  if(!file) return;
  document.getElementById('fileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const points = parseGPX(reader.result);
      loadTrip(points);
    }catch(err){
      showError('Не вдалось прочитати файл — '+err.message);
    }
  };
  reader.onerror = ()=>showError('Не вдалось прочитати файл з диска');
  reader.readAsText(file);
}

document.getElementById('fileBtn').addEventListener('click', ()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e=>handleFile(e.target.files[0]));

const dz = document.getElementById('dropzone');
dz.addEventListener('click', ()=>document.getElementById('fileInput').click());
['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev, e=>{ e.preventDefault(); dz.classList.add('drag'); }));
['dragleave','drop'].forEach(ev=>dz.addEventListener(ev, e=>{ e.preventDefault(); dz.classList.remove('drag'); }));
dz.addEventListener('drop', e=>{
  const file = e.dataTransfer.files && e.dataTransfer.files[0];
  if(file) handleFile(file);
});
// Дозволяємо кинути файл будь-де на сторінці (не тільки в dropzone), поки нема ще завантаженої поїздки.
document.addEventListener('dragover', e=>e.preventDefault());
document.addEventListener('drop', e=>{
  if(tripPoints.length) return;
  e.preventDefault();
  const file = e.dataTransfer.files && e.dataTransfer.files[0];
  if(file) handleFile(file);
});

document.getElementById('scrubSlider').addEventListener('input', e=>{
  if(playing) togglePlay();
  seekTo(parseInt(e.target.value));
});
document.getElementById('playBtn').addEventListener('click', togglePlay);
document.getElementById('speedSel').addEventListener('change', ()=>{
  if(playing){ togglePlay(); togglePlay(); } // перезапуск таймера з новою швидкістю
});
</script>
</body>
</html>
